# Monorepo orchestration: Postgres + the AI service + the web app.
# Bring the whole system up with:  docker compose up --build
#
# The shared bearer secret defaults to a dev value; override it (and provide a
# real OPENAI_API_KEY) via a root .env file or your shell environment.
services:
  db:
    image: postgres:16-alpine
    container_name: dispatch_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: dispatch
    ports:
      # Host 5433 -> container 5432 to avoid clashing with a local Postgres on 5432.
      - "5433:5432"
    volumes:
      - dispatch_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot -d dispatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: ./ai-service
    container_name: dispatch_ai
    restart: unless-stopped
    environment:
      # Bearer secret the web app must present. Keep in sync with web-app below.
      AI_SERVICE_API_KEY: "${AI_SERVICE_API_KEY:-dev-secret}"
      # Optional: without a key the service uses its local keyword fallback.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""
      interval: 5s
      timeout: 5s
      retries: 10

  web-app:
    build:
      context: ./web-app
      target: runner
    container_name: dispatch_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      # Inside the compose network the database host is the service name "db".
      DATABASE_URL: "postgresql://copilot:copilot@db:5432/dispatch?schema=public"
      NODE_ENV: production
      # Point the seam at the AI service; the shared secret must match above.
      AI_SERVICE_URL: "http://ai-service:8000"
      AI_SERVICE_API_KEY: "${AI_SERVICE_API_KEY:-dev-secret}"
    ports:
      - "3000:3000"

  # One-off seeding service. Built from the web app's `builder` stage so it has
  # the full dev toolchain (tsx) needed by `prisma db seed`.
  # Run it with:  docker compose --profile seed run --rm seed
  seed:
    profiles: ["seed"]
    build:
      context: ./web-app
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://copilot:copilot@db:5432/dispatch?schema=public"
    command: sh -c "npx prisma migrate deploy && npm run db:seed"

volumes:
  dispatch_pgdata:
